server:
  port: 8080

spring:
  application:
    name: mywhis-backend
  datasource:
    # 로컬 Postgres 또는 Supabase Postgres 연결 정보 (환경변수로 주입)
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mywhis}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      # 스키마는 supabase/schema.sql 로 직접 생성하므로 none.
      # 편하게 자동 생성하고 싶으면 update 로 바꿔도 됨.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: false

app:
  jwt:
    # 운영에서는 반드시 환경변수로 긴 랜덤 시크릿(32바이트 이상) 주입
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-minimum-1234567890}
    expiration-ms: 604800000  # 7일
  cors:
    # 개발 중 Expo 앱에서의 접근 허용 (운영에선 도메인 지정)
    allowed-origins: "*"
